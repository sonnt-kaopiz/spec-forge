version: 1

task:
  id: "{{TASK_ID}}"
  slug: "{{TASK_SLUG}}"
  title: ""
  description: ""
  created_at: "{{CREATED_AT}}"
  updated_at: "{{CREATED_AT}}"
  assignee: ""
  source: "manual"            # manual | jira:<KEY> | linear:<KEY> | github:<NUM>
  tags: []

# Workflow status
# Valid: discovery | spec | codebase-research | external-research |
#        architecture | planning | phase-execution | completed | blocked | abandoned
status: "discovery"

# Phase execution tracking
current_phase: 0
current_step: "discussion"    # discussion | planning | implementation | verification

# Services involved in this task
services: []
  # - name: "service-name"
  #   repo: "git@github.com:team/service-name.git"
  #   branch: "feature/{{TASK_SLUG}}"
  #   status: "pending"       # pending | in-progress | completed | blocked

# Implementation phases (populated during planning)
phases: []
  # - id: 1
  #   name: "Phase name"
  #   status: "pending"       # pending | in-progress | completed | failed | skipped
  #   service: "service-name"
  #   started_at: null
  #   completed_at: null
  #   verification:
  #     test: null             # null | pass | fail
  #     analyze: null
  #     format: null
  #     review: null           # null | approved | changes-requested

# Blockers
blockers: []
