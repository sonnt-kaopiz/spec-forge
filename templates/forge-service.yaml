# forge-service.yaml — place this in your service repo root
# This connects the service to the central workspace

# Path to the workspace root — the parent folder holding all service repos (absolute)
# .ai-workflow/ directory lives here for all plugin runtime output
workspace_root: "/path/to/workspace"

# Service identity
service_name: "my-service"
stack: "laravel"    # references a profile in central forge.yaml (e.g. laravel, yii2, rails, django, express, springboot, go)

# Override verification commands (optional — defaults come from the stack profile in forge.yaml)
# verification:
#   analyze:
#     config:
#       level: 9
#     paths: ["app/", "domain/"]
#   test:
#     command: "php artisan test --parallel"

# Override paths (optional — for non-standard directory structures)
# paths:
#   services: "app/Domain/Services"
